<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>A Place Worth Remembering</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100%;
  height:100vh;

  overflow:hidden;

  background:
  radial-gradient(circle at top, #1b1b1b 0%, #000 70%);

  font-family:-apple-system,BlinkMacSystemFont,sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* BUTTON */

.relive-btn{

  padding:16px 34px;

  border:none;

  border-radius:999px;

  background:rgba(255,255,255,0.08);

  color:white;

  font-size:16px;

  letter-spacing:1px;

  backdrop-filter:blur(10px);

  -webkit-backdrop-filter:blur(10px);

  box-shadow:
  0 10px 30px rgba(0,0,0,0.35);

  cursor:pointer;

  transition:0.3s ease;
}

.relive-btn:active{
  transform:scale(0.96);
}

/* OVERLAY */

.video-overlay{

  position:fixed;

  inset:0;

  background:rgba(0,0,0,0.88);

  backdrop-filter:blur(10px);

  -webkit-backdrop-filter:blur(10px);

  display:flex;

  justify-content:center;

  align-items:center;

  opacity:0;

  pointer-events:none;

  transition:opacity 0.45s ease;
}

/* OPEN */

.video-overlay.active{
  opacity:1;
  pointer-events:auto;
}

/* VIDEO HOLDER */

.video-wrap{

  width:100vw;

  height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:18px;
}

/* VIDEO */

.video-wrap video{

  width:94vw;

  max-width:520px;

  height:72vh;

  object-fit:cover;

  border-radius:28px;

  background:black;

  box-shadow:
  0 25px 80px rgba(0,0,0,0.7);

  opacity:0;

  transform:
  scale(0.965);

  transition:
  opacity 0.45s ease,
  transform 0.45s ease;
}

/* SHOW */

.video-overlay.active video{

  opacity:1;

  transform:
  scale(1);
}

/* REMOVE IOS CONTROLS */

video::-webkit-media-controls{
  display:none !important;
}

</style>
</head>

<body>

<button class="relive-btn" onclick="openVideo()">
  Relive the Moment
</button>

<div class="video-overlay" id="videoOverlay">

  <div class="video-wrap" onclick="event.stopPropagation()">

    <video
      id="proposalVideo"
      playsinline
      preload="auto">

      <!-- REPLACE VIDEO HERE -->
      <source src="zoomnpin.mp4" type="video/mp4">

    </video>

  </div>

</div>

<script>

const overlay =
document.getElementById("videoOverlay");

const video =
document.getElementById("proposalVideo");

/* OPEN */

function openVideo(){

  overlay.classList.add("active");

  video.currentTime = 0;

  video.muted = false;

  video.volume = 1;

  video.play().catch(() => {});

}

/* CLOSE */

overlay.addEventListener("click", () => {

  overlay.classList.remove("active");

  video.pause();

  video.currentTime = 0;

});

</script>

</body>
</html>
