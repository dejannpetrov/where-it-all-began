<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Beginning</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

body {
    background: black;
    overflow: hidden;
}

/* VIDEO */
#videoContainer {
    position: fixed;
    inset: 0;
    z-index: 1;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.4) blur(6px);
    transform: scale(1.05);
    transition: 1.5s ease;
}

/* PARTICLES */
canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
}

/* UI */
.container {
    position: relative;
    z-index: 3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    transition: opacity 0.8s ease;
}

h1 {
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 30px;
    font-size: clamp(20px, 5vw, 28px);
}

/* BUTTON */
button {
    padding: 16px 40px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 15px;
}

/* QUOTE */
#quote {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(18px, 5vw, 28px);
    color: white;
    opacity: 0;
    z-index: 4;
    white-space: nowrap;
    transition: opacity 1.2s ease;
}

/* FINAL */
#final {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 22px;
    opacity: 0;
    z-index: 10;
    transition: opacity 1.5s ease;
}
</style>
</head>

<body>

<!-- VIDEO -->
<div id="videoContainer">
    <video id="video" src="zoom1.mp4" playsinline preload="auto"></video>
</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- UI -->
<div class="container">
    <h1>A Place Worth Remembering</h1>
    <button id="startBtn">Begin</button>
</div>

<!-- QUOTE -->
<div id="quote">Where it Began...</div>

<!-- FINAL -->
<div id="final">Everything began here...</div>

<script>

/* ---------------- PARTICLES ---------------- */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();

let particles = [];

for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 0.5
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";
    ctx.globalAlpha = 0.4;

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += p.d;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random()*canvas.width;
        }
    });
}
setInterval(draw, 33);

/* ---------------- STORY FLOW ---------------- */

const btn = document.getElementById("startBtn");

btn.addEventListener("pointerdown", startStory); // IMPORTANT FIX

function startStory() {

    const container = document.querySelector(".container");
    const video = document.getElementById("video");
    const quote = document.getElementById("quote");
    const final = document.getElementById("final");

    // hide UI immediately
    container.style.opacity = "0";

    // reset video safely
    video.currentTime = 0;
    video.muted = true;

    // FORCE LOAD VIDEO FIRST (fix iPhone issue)
    video.load();

    // show quote
    setTimeout(() => {
        quote.style.opacity = "1";
    }, 500);

    // start video reliably
    setTimeout(() => {
        let playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.catch(() => {
                console.log("Autoplay blocked, retrying...");
                video.play();
            });
        }
    }, 900);

    // clear cinematic look
    setTimeout(() => {
        quote.style.opacity = "0";
        video.style.filter = "brightness(1) blur(0px)";
        video.style.transform = "scale(1)";
    }, 2000);

    // end screen
    video.addEventListener("timeupdate", () => {
        if (video.duration && video.currentTime > video.duration - 0.4) {
            final.style.opacity = "1";
            video.style.opacity = "0";
        }
    });
}

window.addEventListener("resize", resize);

</script>

</body>
</html>
