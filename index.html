<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where it began...</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* BACKGROUND with zoom */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('your-map-style.jpg') center/cover no-repeat;
    transform: scale(1.2);
    animation: zoomIn 12s ease forwards;
}

/* dark overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* content */
.container {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

/* text */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
}

.quote {
    font-size: 1.2rem;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 2s;
}

.quote span {
    display: block;
    margin-top: 10px;
    opacity: 0.8;
}

/* button */
.btn {
    margin-top: 40px;
    padding: 14px 28px;
    border-radius: 30px;
    border: none;
    background: white;
    color: black;
    font-size: 1rem;
    cursor: pointer;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 4s;
}

/* animations */
@keyframes zoomIn {
    from { transform: scale(1.2); }
    to { transform: scale(1); }
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* mobile */
@media (max-width: 500px) {
    h1 { font-size: 2rem; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
    <h1>Where it began...</h1>

    <p class="quote">
        It’s just a location...
        <span>Until it became everything.</span>
    </p>

    <button class="btn" onclick="goToLocation()">
        Take me there
    </button>
</div>

<script>
function goToLocation() {
    window.location.href = "https://www.google.com/maps/place/47%C2%B053'56.0%22N+8%C2%B009'14.0%22E/@47.8988925,8.151314,585m/data=!3m2!1e3!4b1!4m4!3m3!8m2!3d47.8988889!4d8.1538889?entry=ttu&g_ep=EgoyMDI2MDQyOS4wIKXMDSoASAFQAw%3D%3D";
}
</script>

</body>
</html>
