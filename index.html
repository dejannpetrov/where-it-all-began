<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #060913;
  color: white;
  font-family: Inter, sans-serif;
}

/* PARTICLES (calm, low distraction) */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.6;
}

/* INTRO */
#intro {
  position: absolute;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  backdrop-filter: blur(6px);
  transition: opacity 1s ease;
}

h1 {
  font-family: "Playfair Display", serif;
  font-weight: 400;
  font-size: 28px;
  white-space: nowrap;
  margin-bottom: 30px;
  opacity: 0.95;
}

button {
  padding: 14px 30px;
  border-radius: 40px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:active {
  transform: scale(0.98);
  box-shadow: 0 0 30px rgba(255,255,255,0.8);
}

/* VIDEO */
#videoContainer {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  transform: translate(-50%, -50%);
  opacity: 0;
  z-index: 1;
  transition: opacity 2s ease;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(6px) brightness(0.75);
  transition: filter 2s ease;
}

#videoContainer.active {
  opacity: 1;
}

#videoContainer.active video {
  filter: blur(0px) brightness(1);
}

/* 🔥 OVERLAY POPUP */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Playfair Display", serif;
  font-size: 26px;
  opacity: 0;
  pointer-events: none;
  z-index: 10000;
  transition: opacity 1.2s ease;
}

#overlay.show {
  opacity: 1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- INTRO -->
<div id="intro">
  <h1>The Place Worth Remembering...</h1>
  <button onclick="startSequence()">Relieve the Moment</button>
</div>

<!-- OVERLAY -->
<div id="overlay">Where it began...</div>

<!-- VIDEO -->
<div id="videoContainer">
  <video id="bgVideo" src="your-video.mp4" playsinline></video>
</div>

<script>

// BUTTON SEQUENCE
function startSequence() {
  document.getElementById("intro").style.opacity = "0";

  const overlay = document.getElementById("overlay");
  const videoContainer = document.getElementById("videoContainer");
  const video = document.getElementById("bgVideo");

  // show overlay first
  setTimeout(() => {
    overlay.classList.add("show");
  }, 400);

  // then start video
  setTimeout(() => {
    overlay.classList.remove("show");
    videoContainer.classList.add("active");
    video.play();
  }, 2200);
}

// PARTICLES (soft memory dust)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 65; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2.2,
    d: Math.random() * 1.2
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {

    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 10);

    glow.addColorStop(0, "rgba(255,255,255,0.8)");
    glow.addColorStop(0.3, "rgba(255,255,255,0.25)");
    glow.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 2.5, 0, Math.PI * 2);
    ctx.fill();

    p.y -= p.d;
    p.x += Math.sin(p.y * 0.01) * 0.3;

    if (p.y < 0) {
      p.y = canvas.height;
      p.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawParticles);
}

drawParticles();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
