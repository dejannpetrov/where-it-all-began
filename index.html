<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Beginning</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

body {
    background: black;
    overflow: hidden;
}

/* VIDEO BACKGROUND */
#videoContainer {
    position: fixed;
    inset: 0;
    z-index: 1;
}
video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.4) blur(6px);
    transform: scale(1.05);
    transition: filter 2s ease, transform 2s ease;
}
/* PARTICLES */
canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
}

/* MAIN CONTENT */
.container {
    position: relative;
    z-index: 3;
    height: 100vh;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
    transition: opacity 0.8s ease;
}

h1 {
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 40px;
    opacity: 0.85;
    font-size: clamp(20px, 5vw, 28px);
}

/* BUTTON */
button {
    padding: 16px 42px;
    font-size: 15px;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
    border-radius: 999px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

button:hover {
    background: white;
    color: black;
    box-shadow: 0 0 25px rgba(255,255,255,0.6);
}

/* QUOTE */
#quote {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    font-size: clamp(18px, 5vw, 28px);
    letter-spacing: 2px;
    font-style: italic;
    color: white;
    opacity: 0;
    z-index: 4;
    white-space: nowrap;
    transition: opacity 1.5s ease, transform 1.5s ease;
}

/* MOBILE */
@media (max-width: 480px) {
    button {
        padding: 14px 32px;
        font-size: 14px;
    }
}
</style>
</head>

<body>

<!-- VIDEO -->
<div id="videoContainer">
    <video id="video" src="1111.mp4" playsinline></video>
</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- MAIN -->
<div class="container">
    <h1>A Place Worth Remembering</h1>
    <button onclick="startExperience()">Relive the moment</button>
</div>

<!-- QUOTE -->
<div id="quote">Where it Began...</div>

<script>
/* ---------------- PARTICLES ---------------- */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];
for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 0.6
    });
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.globalAlpha = 0.4;

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    });

    particles.forEach(p => {
        p.y += p.d;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });
}

setInterval(drawParticles, 33);

/* ---------------- EXPERIENCE FLOW ---------------- */
function startExperience() {
    const container = document.querySelector('.container');
    const video = document.getElementById('video');
    const quote = document.getElementById('quote');

    container.style.opacity = "0";

    // Show quote first
    setTimeout(() => {
        quote.style.opacity = "1";
        quote.style.transform = "translate(-50%, -50%) scale(1)";
    }, 500);

    // Start video slightly BEFORE quote fades
    setTimeout(() => {
        video.muted = true;
        video.currentTime = 0;
        video.play();
    }, 1800);

    // Fade quote + reveal video clarity
    setTimeout(() => {
        quote.style.opacity = "0";
        quote.style.transform = "translate(-50%, -50%) scale(0.95)";

        video.style.filter = "brightness(1) blur(0px)";
        video.style.transform = "scale(1)";
    }, 2500);
}

/* ---------------- RESIZE ---------------- */
window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
