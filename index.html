<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* BUTTON */
.open-btn {
  padding: 14px 28px;
  border: none;
  border-radius: 30px;
  background: #c9a96e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
  
.watch-btn {
  padding: 14px 28px;
  border: none;
  border-radius: 30px;
  background: #c9a96e;
  color: white;
  font-size: 16px;
  cursor: pointer;

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

/* ACTIVE STATE */
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* VIDEO CONTAINER */
.modal {
  width: 90%;
  max-width: 500px;
  transform: scale(0.8);
  opacity: 0;
  transition: all 0.4s ease;
}

/* ANIMATE IN */
.overlay.active .modal {
  transform: scale(1);
  opacity: 1;
}

/* VIDEO */
video {
  width: 100%;
  border-radius: 15px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
  

/* CLOSE AREA (click outside) */
.overlay::after {
  content: "";
  position: absolute;
  inset: 0;
}
  
/* OVERLAY */
.video-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.video-overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* MODAL */
.video-modal {
  width: 90%;
  max-width: 500px;

  transform: scale(0.9);
  opacity: 0;
  transition: all 0.35s ease;
}

.video-overlay.active .video-modal {
  transform: scale(1);
  opacity: 1;
}

/* VIDEO */
video {
  width: 100%;
  border-radius: 15px;
  background: black;
}

/* REMOVE default controls UI */
video::-webkit-media-controls {
  display: none !important;
}
</style>
</head>

<body>
    <!-- BUTTON -->
<button onclick="openVideo()" class="watch-btn">
  Watch Our Moment
</button>

<!-- VIDEO POPUP -->
<div id="videoOverlay" class="video-overlay">
  <div class="video-modal" onclick="event.stopPropagation()">
    <video id="weddingVideo" playsinline preload="auto">
      <source src="zoom1.mp4" type="video/mp4">
    </video>
  </div>

<script>
const overlay = document.getElementById("overlay");
const video = document.getElementById("video");

function openVideo() {
  overlay.classList.add("active");

  // small delay so animation feels smooth
  setTimeout(() => {
    video.play().catch(() => {});
  }, 200);
}

function closeVideo() {
  overlay.classList.remove("active");
  video.pause();
  video.currentTime = 0;
}
</script>

</body>
</html>
