<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Beginning</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

body {
    background: #0a0a0a;
    color: white;
    overflow: hidden;
}

/* PARTICLES */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* MAIN */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    transition: opacity 1s ease;
}

/* TITLE */
h1 {
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 40px;
    opacity: 0.85;
    font-size: clamp(20px, 5vw, 28px);
}

/* BUTTON */
button {
    padding: 16px 42px;
    font-size: 15px;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
    border-radius: 999px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

button:hover {
    background: white;
    color: black;
    box-shadow: 0 0 25px rgba(255,255,255,0.6);
}

/* VIDEO */
#videoContainer {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 5;
    opacity: 0;
    transition: opacity 1s ease;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.95) contrast(1.05);
}

/* QUOTE */
#quote {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    letter-spacing: 3px;
    white-space: nowrap;
    font-size: clamp(18px, 5vw, 28px);
    font-style: italic;
    opacity: 0;
    z-index: 6;
    transition: opacity 2s ease;
    text-align: center;
    padding: 0 20px;
}

/* MOBILE */
@media (max-width: 480px) {
    h1 {
        margin-bottom: 30px;
    }

    button {
        padding: 14px 32px;
        font-size: 14px;
    }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>A Place Worth Remembering</h1>
    <button onclick="startExperience()">Begin</button>
</div>

<div id="videoContainer">
    <video id="video" src="zoom1.mp4" playsinline></video>
</div>

<div id="quote">Where it Began...</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];
for (let i = 0; i < 70; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 0.6
    });
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.globalAlpha = 0.5;

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    });

    particles.forEach(p => {
        p.y += p.d;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });
}

setInterval(drawParticles, 33);

function startExperience() {
    const container = document.querySelector('.container');
    const videoContainer = document.getElementById('videoContainer');
    const video = document.getElementById('video');

    container.style.opacity = "0";

    setTimeout(() => {
        videoContainer.style.display = "flex";
        videoContainer.style.opacity = "1";
        video.muted = true;
        video.play();
    }, 900);

    video.onended = () => {
        videoContainer.style.opacity = "0";

        setTimeout(() => {
            videoContainer.style.display = "none";
            document.getElementById('quote').style.opacity = "1";
        }, 1200);
    };
}

window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
