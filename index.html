<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory Proposal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: #0b0f1a;
  color: white;
}

/* Particle canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* Intro screen */
#intro {
  position: absolute;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(8px);
  transition: opacity 1.5s ease;
}

h1 {
  font-weight: 400;
  margin-bottom: 20px;
  opacity: 0.9;
}

input {
  width: 80%;
  max-width: 320px;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.08);
  color: white;
  text-align: center;
}

button {
  margin-top: 20px;
  padding: 12px 24px;
  border-radius: 30px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.3s ease;
}

button:hover {
  transform: scale(1.05);
}

/* Video layer */
#videoContainer {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 80%;
  height: 45%;
  transform: translate(-50%, -50%) scale(0.8);
  opacity: 0;
  z-index: 1;
  transition: all 2s ease-in-out;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 20px;
  filter: blur(6px) brightness(0.8);
  transition: filter 2s ease;
}

#videoContainer.active {
  width: 100%;
  height: 100%;
  border-radius: 0;
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

#videoContainer.active video {
  filter: blur(0px) brightness(1);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- INTRO -->
<div id="intro">
  <h1>Where did it begin?</h1>
  <input placeholder="Enter a place to remember..." />
  <input placeholder="Another memory..." />
  <button onclick="startVideo()">Relieve the Moment</button>
</div>

<!-- VIDEO -->
<div id="videoContainer">
  <video id="bgVideo" src="zoomnpin.mp4" playsinline></video>
</div>

<script>
// ---------------- VIDEO START ----------------
function startVideo() {
  document.getElementById("intro").style.opacity = "0";

  const videoContainer = document.getElementById("videoContainer");
  const video = document.getElementById("bgVideo");

  setTimeout(() => {
    videoContainer.classList.add("active");
    video.play();
  }, 800);
}

// ---------------- PARTICLES ----------------
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 1,
    d: Math.random() * 1
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(255,255,255,0.6)";

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2, false);
    ctx.fill();

    p.y -= p.d;
    if (p.y < 0) {
      p.y = canvas.height;
      p.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawParticles);
}

drawParticles();

// resize fix
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
