<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Beginning</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

body {
    background: black;
    overflow: hidden;
}

/* VIDEO */
#videoContainer {
    position: fixed;
    inset: 0;
    z-index: 1;
}

video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.4) blur(6px);
    transform: scale(1.05);
    transition: filter 2s ease, transform 2s ease, opacity 1s ease;
}

/* PARTICLES */
canvas {
    position: fixed;
    inset: 0;
    z-index: 2;
}

/* MAIN */
.container {
    position: relative;
    z-index: 3;
    height: 100vh;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    color: white;
    transition: opacity 0.8s ease;
}

h1 {
    font-weight: 300;
    letter-spacing: 2px;
    margin-bottom: 40px;
    opacity: 0.85;
    font-size: clamp(20px, 5vw, 28px);
}

/* BUTTON */
button {
    padding: 16px 42px;
    font-size: 15px;
    letter-spacing: 1px;
    border: 1px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.08);
    color: white;
    cursor: pointer;
    border-radius: 999px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}

button:hover {
    background: white;
    color: black;
}

/* QUOTE */
#quote {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    font-size: clamp(18px, 5vw, 28px);
    letter-spacing: 2px;
    font-style: italic;
    color: white;
    opacity: 0;
    z-index: 4;
    white-space: nowrap;
    transition: opacity 1.5s ease, transform 1.5s ease;
}

/* IMAGE OVERLAY */
#imgOverlay {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease;
    background: rgba(0,0,0,0.3);
}

#imgOverlay img {
    position: absolute;
    width: 80%;
    max-width: 360px;
    border-radius: 18px;
    opacity: 0;
    transform: scale(1.05);
    transition: opacity 1s ease, transform 1s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* FINAL SCREEN */
#finalScreen {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: clamp(18px, 5vw, 28px);
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 2s ease;
    text-align: center;
}

/* MOBILE */
@media (max-width: 480px) {
    button {
        padding: 14px 32px;
        font-size: 14px;
    }
}
</style>
</head>

<body>

<!-- VIDEO -->
<div id="videoContainer">
    <video id="video" src="zoom1.mp4" playsinline></video>
</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- MAIN -->
<div class="container">
    <h1>A Place Worth Remembering</h1>
    <button onclick="startExperience()">Begin</button>
</div>

<!-- QUOTE -->
<div id="quote">Where it Began...</div>

<!-- IMAGE OVERLAY -->
<div id="imgOverlay"></div>

<!-- FINAL -->
<div id="finalScreen">Everything began here...</div>

<script>
/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];
for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 0.6
    });
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.globalAlpha = 0.4;

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    });

    particles.forEach(p => {
        p.y += p.d;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });
}
setInterval(drawParticles, 33);

/* IMAGES */
const overlay = document.getElementById("imgOverlay");

const images = ["img1.jpg", "img2.jpg", "img3.jpg"];

let imgElements = images.map(src => {
    let img = document.createElement("img");
    img.src = src;
    overlay.appendChild(img);
    return img;
});

/* EXPERIENCE */
function startExperience() {
    const container = document.querySelector('.container');
    const video = document.getElementById('video');
    const quote = document.getElementById('quote');
    const finalScreen = document.getElementById('finalScreen');

    container.style.opacity = "0";

    /* quote */
    setTimeout(() => {
        quote.style.opacity = "1";
        quote.style.transform = "translate(-50%, -50%) scale(1)";
    }, 500);

    /* start video early */
    setTimeout(() => {
        video.muted = true;
        video.currentTime = 0;
        video.play();
    }, 1800);

    /* reveal clarity + start image sequence */
    setTimeout(() => {
        quote.style.opacity = "0";

        video.style.filter = "brightness(1) blur(0px)";
        video.style.transform = "scale(1)";
    }, 2500);

    /* IMAGE SEQUENCE near end */
    video.ontimeupdate = () => {
        const t = video.currentTime;
        const end = video.duration;

        if (end - t <= 3 && !window.imgStarted) {
            window.imgStarted = true;

            overlay.style.opacity = "1";

            setTimeout(() => {
                imgElements[0].style.opacity = "1";
            }, 0);

            setTimeout(() => {
                imgElements[0].style.opacity = "0";
                imgElements[1].style.opacity = "1";
            }, 900);

            setTimeout(() => {
                imgElements[1].style.opacity = "0";
                imgElements[2].style.opacity = "1";
            }, 1800);
        }

        /* FINAL END */
        if (end - t <= 0.5 && !window.done) {
            window.done = true;

            overlay.style.opacity = "0";
            finalScreen.style.opacity = "1";
            video.style.opacity = "0";
        }
    };
}

window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
