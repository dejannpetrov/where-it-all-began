<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Memory</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BACKGROUND */
body {
  height: 100vh;
  overflow: hidden;
  background: #060913;
  color: white;
  font-family: Inter, sans-serif;
}

/* 🔥 PARTICLES ALWAYS ON TOP */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.6;
  filter: blur(0.3px);
}

/* INTRO */
#intro {
  position: absolute;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  backdrop-filter: blur(6px);
  transition: opacity 1.5s ease;
  padding: 20px;
}

/* TITLE */
h1 {
  font-family: "Playfair Display", serif;
  font-weight: 400;
  font-size: 28px;
  letter-spacing: 1.2px;
  opacity: 0.95;

  white-space: nowrap;
  margin-bottom: 30px;
}

/* BUTTON */
button {
  padding: 14px 30px;
  border-radius: 40px;
  border: none;
  background: white;
  color: black;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,255,255,0.4);
}

button:active {
  box-shadow: 0 0 35px rgba(255,255,255,0.9);
  transform: scale(0.98);
}

/* VIDEO LAYER */
#videoContainer {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 80%;
  height: 45%;
  transform: translate(-50%, -50%) scale(0.85);
  opacity: 0;
  z-index: 1;
  transition: all 2s ease-in-out;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 18px;
  filter: blur(6px) brightness(0.75);
  transition: filter 2s ease;
}

#videoContainer.active {
  width: 100%;
  height: 100%;
  border-radius: 0;
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}

#videoContainer.active video {
  filter: blur(0px) brightness(1);
}

/* mobile fix */
@media (max-width: 420px) {
  h1 {
    font-size: 22px;
  }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- INTRO -->
<div id="intro">
  <h1>The Place Worth Remembering...</h1>
  <button onclick="startVideo()">Relieve the Moment</button>
</div>

<!-- VIDEO -->
<div id="videoContainer">
  <video id="bgVideo" src="zoomnpin.mp4" playsinline></video>
</div>

<script>

// VIDEO START
function startVideo() {
  document.getElementById("intro").style.opacity = "0";

  const videoContainer = document.getElementById("videoContainer");
  const video = document.getElementById("bgVideo");

  setTimeout(() => {
    videoContainer.classList.add("active");
    video.play();
  }, 800);
}

// PARTICLES (WHITE CINEMATIC FLOATING DUST)
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 65; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2.2,
    d: Math.random() * 1.4
  });
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {

    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 12);

    glow.addColorStop(0, "rgba(255,255,255,0.8)");
    glow.addColorStop(0.3, "rgba(255,255,255,0.25)");
    glow.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = glow;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
    ctx.fill();

    // smooth floating motion
    p.y -= p.d;
    p.x += Math.sin(p.y * 0.01) * 0.3;

    if (p.y < 0) {
      p.y = canvas.height;
      p.x = Math.random() * canvas.width;
    }
  });

  requestAnimationFrame(drawParticles);
}

drawParticles();

// resize fix
window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
