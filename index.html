<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where it began...</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
    background: linear-gradient(135deg, #1a1a1a, #2b2b2b, #111);
    background-size: 400% 400%;
    animation: gradientMove 15s ease infinite;
}

/* soft vignette */
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
    top: 0;
    left: 0;
}

/* container */
.container {
    position: relative;
    z-index: 2;
    padding: 20px;
    max-width: 90%;
}

/* title */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    margin-bottom: 20px;
}

/* quote */
.quote {
    font-size: 1.2rem;
    line-height: 1.6;
    opacity: 0.9;
    margin-bottom: 40px;
}

/* highlight second line */
.quote span {
    display: block;
    margin-top: 10px;
    font-size: 1rem;
    opacity: 0.7;
}

/* button */
.btn {
    padding: 14px 30px;
    font-size: 1rem;
    border-radius: 30px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.3s ease;
}

.btn:hover {
    transform: scale(1.05);
}

/* animation */
.fade {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 1.5s ease forwards;
}

.fade.delay {
    animation-delay: 1s;
}

.fade.delay2 {
    animation-delay: 2s;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* mobile */
@media (max-width: 500px) {
    h1 { font-size: 2.2rem; }
    .quote { font-size: 1.05rem; }
}
</style>
</head>

<body>

<div class="container">

    <h1 class="fade">Where it began...</h1>

    <p class="quote fade delay">
        It’s just a location...
        <span>Until it became everything.</span>
    </p>

    <button class="btn fade delay2" onclick="goToLocation()">
        Take me there
    </button>

</div>

<script>
function goToLocation() {
    window.location.href = "https://maps.google.com/?q=YOUR_LOCATION_HERE";
}
</script>

</body>
</html>
