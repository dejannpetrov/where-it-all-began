<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Beginning</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Helvetica Neue', sans-serif;
    }

    body {
        background: #0a0a0a;
        color: white;
        overflow: hidden;
    }

    /* PARTICLE CANVAS */
    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 0;
    }

    /* LANDING CONTENT */
    .container {
        position: relative;
        z-index: 2;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        text-align: center;
    }

    h1 {
        font-weight: 300;
        letter-spacing: 2px;
        margin-bottom: 30px;
        opacity: 0.8;
    }

    button {
        padding: 15px 40px;
        font-size: 16px;
        border: 1px solid white;
        background: transparent;
        color: white;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        background: white;
        color: black;
    }

    /* VIDEO FULLSCREEN */
    #videoContainer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 5;
        opacity: 0;
        transition: opacity 1s ease;
    }

    video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* QUOTE */
    #quote {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 28px;
        letter-spacing: 2px;
        opacity: 0;
        z-index: 6;
        transition: opacity 2s ease;
    }

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>A Place Worth Remembering</h1>
    <button onclick="startExperience()">Open the Moment</button>
</div>

<div id="videoContainer">
    <video id="video" src="your-zoom1.mp4" playsinline></video>
</div>

<div id="quote">Where it Began...</div>

<script>
/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        d: Math.random() * 1
    });
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.globalAlpha = 0.5;

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    });

    updateParticles();
}

function updateParticles() {
    particles.forEach(p => {
        p.y += p.d;
        if (p.y > canvas.height) {
            p.y = 0;
            p.x = Math.random() * canvas.width;
        }
    });
}

setInterval(drawParticles, 33);

/* EXPERIENCE FLOW */
function startExperience() {
    const container = document.querySelector('.container');
    const videoContainer = document.getElementById('videoContainer');
    const video = document.getElementById('video');

    container.style.opacity = "0";

    setTimeout(() => {
        videoContainer.style.display = "flex";
        videoContainer.style.opacity = "1";

        video.play(); // autoplay without controls

    }, 1000);

    video.onended = () => {
        videoContainer.style.opacity = "0";

        setTimeout(() => {
            videoContainer.style.display = "none";
            document.getElementById('quote').style.opacity = "1";
        }, 1500);
    };
}

/* RESIZE FIX */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
